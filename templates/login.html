<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect | PySQLManager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background: radial-gradient(circle at top right, hsl(265, 50%, 12%), var(--bg-color));">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-title">📊 PySQLManager</div>
      <div class="login-subtitle">Database Management Interface</div>
      
      <!-- Flash notifications -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert alert-{{ category }}" role="alert" style="margin-bottom: 20px; font-size: 0.9rem;">
              <span>{{ msg }}</span>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('auth_bp.login') }}" method="POST" id="login-form">
        <div class="form-group">
          <label for="host">MySQL Server Host</label>
          <input type="text" id="host" name="host" class="form-control" value="{{ form_data.host }}" required autocomplete="off">
        </div>
        
        <div class="form-group">
          <label for="port">MySQL Port</label>
          <input type="text" id="port" name="port" class="form-control" value="{{ form_data.port }}" required autocomplete="off" inputmode="numeric" pattern="\d+">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ form_data.username }}" required autocomplete="username">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="No Password" autocomplete="current-password">
          </div>
        </div>
        
        <div class="form-group" style="margin-top: 10px;">
          <label for="database">Default Database (Optional)</label>
          <input type="text" id="database" name="database" class="form-control" value="{{ form_data.database }}" placeholder="e.g. mysql" autocomplete="off">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px; font-size: 1.05rem;">
          ⚡ Connect to MySQL
        </button>
      </form>
    </div>
  </div>
  
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
